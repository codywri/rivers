<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f4e79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="River Flows">
<title>Local River Flows</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%231f4e79'/%3E%3Cpath d='M4 38c8 0 8-6 16-6s8 6 16 6 8-6 16-6 8 6 16 6' fill='none' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M4 50c8 0 8-6 16-6s8 6 16 6 8-6 16-6 8 6 16 6' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' opacity='0.6'/%3E%3C/svg%3E">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #666;
    --accent: #1f4e79;
    --warn: #b00020;
    --observed: #1f77b4;
    --forecast: #d62728;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: env(safe-area-inset-bottom, 16px);
    padding-top: max(16px, env(safe-area-inset-top));
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 22px;
    margin: 0;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .meta {
    color: var(--muted);
    font-size: 12px;
  }
  button.refresh {
    -webkit-appearance: none;
    appearance: none;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    min-height: 36px;
  }
  button.refresh:active { opacity: 0.7; }
  button.refresh:disabled { opacity: 0.5; }

  /* Summary cards on mobile, table on wider screens */
  .summary {
    margin-bottom: 18px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .summary-card .name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .summary-card .row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin: 2px 0;
  }
  .summary-card .row b {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .summary-card .note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }
  .summary-card .err {
    font-size: 11px;
    color: var(--warn);
    margin-top: 4px;
  }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 12px;
  }
  .chart-title {
    font-weight: 600;
    font-size: 15px;
    padding: 6px 8px 2px;
    color: var(--accent);
  }
  .chart-sub {
    font-size: 11px;
    color: var(--muted);
    padding: 0 8px 6px;
  }
  .chart-sub.warn { color: var(--warn); }
  .plot {
    width: 100%;
    height: 260px;
  }
  @media (min-width: 700px) {
    h1 { font-size: 26px; }
    .plot { height: 320px; }
    .chart-title { font-size: 17px; }
  }

  .loading, .error-banner {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .error-banner { color: var(--warn); }

  .add-gauge-bar { margin-bottom: 14px; }
  .add-toggle {
    -webkit-appearance: none; appearance: none;
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    min-height: 36px;
    width: 100%;
  }
  .add-toggle:active { opacity: 0.7; }
  .add-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-top: 8px;
  }
  .add-panel input[type="search"] {
    -webkit-appearance: none; appearance: none;
    width: 100%;
    padding: 10px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .add-panel input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .add-status {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    min-height: 16px;
  }
  .add-status.warn { color: var(--warn); }
  .add-results {
    max-height: 320px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .add-results:empty { display: none; }
  .gauge-result {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .gauge-result:last-child { border-bottom: none; }
  .gauge-result:active { background: #f0f0f0; }
  .gauge-result.already { opacity: 0.5; cursor: not-allowed; }
  .gauge-result .gname { font-size: 14px; font-weight: 500; color: var(--text); }
  .gauge-result .gmeta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .summary-card { position: relative; }
  .summary-card .remove-btn {
    -webkit-appearance: none; appearance: none;
    position: absolute;
    top: 8px; right: 8px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 26px; height: 26px;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .summary-card .remove-btn:active { opacity: 0.5; }
  @media (min-width: 700px) {
    .add-toggle { width: auto; min-width: 180px; }
  }

  footer {
    margin-top: 18px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding-bottom: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Local River Flows</h1>
      <div class="meta" id="metaLine">Loading…</div>
    </div>
    <button class="refresh" id="refreshBtn" type="button">Refresh</button>
  </header>

  <div class="add-gauge-bar">
    <button class="add-toggle" id="addToggleBtn" type="button">+ Add gauge</button>
    <div class="add-panel" id="addPanel" hidden>
      <input type="search" id="addInput" placeholder="Search river or gauge name…" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div class="add-status" id="addStatus"></div>
      <div class="add-results" id="addResults"></div>
    </div>
  </div>

  <div id="summary" class="summary"></div>
  <div id="charts"></div>

  <footer>
    Observed: USGS NWIS · Forecast: NOAA NWPS · cfs = cubic feet/second · stage = ft
  </footer>
</div>

<script>
"use strict";

// -------------------------------------------------------- gauge config

const GAUGES = [
  { name: "Clark Fork above Missoula",   usgs: "12340500", nwsli: "ABOM8" },
  { name: "Clark Fork at St. Regis",     usgs: "12354500", nwsli: "SRGM8" },
  { name: "Lochsa River near Lowell",    usgs: "13337000", nwsli: "LOCI1" },
  { name: "Blackfoot River near Bonner", usgs: "12340000", nwsli: "BONM8" },
];

// CORS proxy fallback. Used only when a direct fetch fails due to CORS.
// corsproxy.io is a free public proxy; if it ever goes away the script
// will degrade gracefully (forecast missing, observed still works for USGS
// because USGS supports CORS directly).
const CORS_PROXY = "https://corsproxy.io/?";

// User-added gauges live in localStorage, merged with GAUGES at render time.
const LS = {
  cat: "rivers.catalog",
  catTime: "rivers.catalog.time",
  user: "rivers.userGauges",
};
const CATALOG_TTL_MS = 30 * 24 * 60 * 60 * 1000;

function loadUserGauges() {
  try {
    const v = JSON.parse(localStorage.getItem(LS.user));
    return Array.isArray(v) ? v : [];
  } catch { return []; }
}

function saveUserGauges(list) {
  try { localStorage.setItem(LS.user, JSON.stringify(list)); }
  catch (e) { console.warn("saveUserGauges failed", e); }
}

function activeGauges() {
  const user = loadUserGauges().map(g => ({ ...g, custom: true }));
  return [...GAUGES, ...user];
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// -------------------------------------------------------- fetch helpers

async function fetchJson(url, { retryViaProxy = true } = {}) {
  // Try direct first.
  try {
    const r = await fetch(url, { mode: "cors" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } catch (e) {
    if (!retryViaProxy) throw e;
    // Fallback through CORS proxy.
    const proxied = CORS_PROXY + encodeURIComponent(url);
    const r = await fetch(proxied);
    if (!r.ok) throw new Error("Proxy HTTP " + r.status);
    return await r.json();
  }
}

async function fetchUsgsObserved(siteId) {
  const url = `https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${siteId}&parameterCd=00060&period=P7D`;
  // USGS supports CORS, but some configurations (file:// origin, certain
  // headers) can return 403. Allow proxy fallback as a safety net.
  const j = await fetchJson(url);
  const tsList = j?.value?.timeSeries ?? [];
  if (tsList.length === 0) return { times: [], values: [] };
  const points = tsList[0]?.values?.[0]?.value ?? [];
  const times = [];
  const values = [];
  for (const p of points) {
    const v = parseFloat(p.value);
    if (!isFinite(v) || v < 0) continue;  // -999999 is USGS missing-data sentinel
    times.push(new Date(p.dateTime));
    values.push(v);
  }
  return { times, values };
}

async function fetchNwpsForecast(nwsli) {
  const url = `https://api.water.noaa.gov/nwps/v1/gauges/${nwsli}/stageflow`;
  const j = await fetchJson(url);
  const fc = j?.forecast ?? {};
  const data = fc.data ?? [];
  if (data.length === 0) return { flow: null, stage: null, note: "no NWPS forecast available" };

  const pUnit = (fc.primaryUnits ?? "").toLowerCase();
  const sUnit = (fc.secondaryUnits ?? "").toLowerCase();

  const looksLikeCfs = (u) => /cfs|kcfs|ft\^?3\/s/.test(u);
  const looksLikeFt  = (u) => u === "ft" || u === "feet";

  const buildSeries = (key, scale) => {
    const times = [], values = [];
    for (const pt of data) {
      const v = parseFloat(pt[key]);
      if (!isFinite(v)) continue;
      times.push(new Date(pt.validTime));
      values.push(v * scale);
    }
    return { times, values };
  };

  let flow = null, stage = null;
  if (looksLikeCfs(pUnit)) {
    flow = buildSeries("primary", pUnit.includes("kcfs") ? 1000 : 1);
  } else if (looksLikeFt(pUnit)) {
    stage = buildSeries("primary", 1);
  }
  if (!flow && looksLikeCfs(sUnit)) {
    flow = buildSeries("secondary", sUnit.includes("kcfs") ? 1000 : 1);
  }
  if (!stage && looksLikeFt(sUnit)) {
    stage = buildSeries("secondary", 1);
  }

  let note;
  if (flow) note = "forecast flow available (cfs)";
  else if (stage) note = `forecast stage only (ft); no cfs forecast`;
  else note = `forecast units unrecognised (primary='${pUnit}', secondary='${sUnit}')`;

  return { flow, stage, note };
}

async function loadCatalog() {
  const cached = localStorage.getItem(LS.cat);
  const cachedTime = parseInt(localStorage.getItem(LS.catTime) || "0", 10);
  if (cached && Date.now() - cachedTime < CATALOG_TTL_MS) {
    try {
      const v = JSON.parse(cached);
      if (Array.isArray(v) && v.length) return v;
    } catch {}
  }
  // Large response (~13 MB raw); strip to {lid, name, state} (~500 KB) before caching.
  const j = await fetchJson("https://api.water.noaa.gov/nwps/v1/gauges");
  const raw = j?.gauges ?? [];
  const stripped = [];
  for (const g of raw) {
    if (!g.lid || !g.name) continue;
    stripped.push({ lid: g.lid, name: g.name, state: g.state?.abbreviation || "" });
  }
  try {
    localStorage.setItem(LS.cat, JSON.stringify(stripped));
    localStorage.setItem(LS.catTime, Date.now().toString());
  } catch (e) {
    console.warn("could not cache catalog", e);
  }
  return stripped;
}

async function lookupUsgsId(lid) {
  const j = await fetchJson(`https://api.water.noaa.gov/nwps/v1/gauges/${lid}`);
  return j?.usgsId || null;
}

function searchCatalog(catalog, query, limit = 25) {
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  const out = [];
  for (const g of catalog) {
    if (g.name.toLowerCase().includes(q)) {
      out.push(g);
      if (out.length >= limit) break;
    }
  }
  return out;
}

async function collectGauge(g) {
  const out = { gauge: g, obs: null, fcstFlow: null, fcstStage: null, note: "", errors: [] };
  const [obsRes, fcstRes] = await Promise.allSettled([
    fetchUsgsObserved(g.usgs),
    fetchNwpsForecast(g.nwsli),
  ]);
  if (obsRes.status === "fulfilled") {
    out.obs = obsRes.value;
    if (out.obs.values.length === 0) out.errors.push("USGS returned no discharge for last 7 days");
  } else {
    out.errors.push("USGS fetch failed: " + obsRes.reason.message);
  }
  if (fcstRes.status === "fulfilled") {
    out.fcstFlow = fcstRes.value.flow;
    out.fcstStage = fcstRes.value.stage;
    out.note = fcstRes.value.note;
  } else {
    out.errors.push("NWPS fetch failed: " + fcstRes.reason.message);
  }
  return out;
}

// -------------------------------------------------------- rendering

function fmtCfs(v) { return v == null ? "—" : v.toLocaleString(undefined, { maximumFractionDigits: 0 }) + " cfs"; }
function fmtFt(v)  { return v == null ? "—" : v.toFixed(2) + " ft"; }
function fmtTime(d) { return d.toLocaleString(undefined, { weekday: "short", hour: "numeric", minute: "2-digit" }); }

function summarize(gd) {
  const obs = gd.obs;
  const latestVal = obs && obs.values.length ? obs.values[obs.values.length - 1] : null;
  const latestTime = obs && obs.times.length ? obs.times[obs.times.length - 1] : null;

  let peakStr = "—";
  const cutoff = new Date(Date.now() + 72 * 3600 * 1000);
  if (gd.fcstFlow && gd.fcstFlow.values.length) {
    const window = gd.fcstFlow.times
      .map((t, i) => [t, gd.fcstFlow.values[i]])
      .filter(([t]) => t <= cutoff);
    if (window.length) {
      const [pt, pv] = window.reduce((a, b) => (b[1] > a[1] ? b : a));
      peakStr = `${fmtCfs(pv)} (${fmtTime(pt)})`;
    }
  } else if (gd.fcstStage && gd.fcstStage.values.length) {
    const window = gd.fcstStage.times
      .map((t, i) => [t, gd.fcstStage.values[i]])
      .filter(([t]) => t <= cutoff);
    if (window.length) {
      const [pt, pv] = window.reduce((a, b) => (b[1] > a[1] ? b : a));
      peakStr = `${fmtFt(pv)} stage (${fmtTime(pt)})`;
    }
  }

  return { latestVal, latestTime, peakStr };
}

function renderSummary(allData) {
  const root = document.getElementById("summary");
  root.innerHTML = "";
  for (const gd of allData) {
    const s = summarize(gd);
    const card = document.createElement("div");
    card.className = "summary-card";
    let html = `<div class="name">${escapeHtml(gd.gauge.name)}</div>`;
    html += `<div class="row"><span>Latest</span><b>${fmtCfs(s.latestVal)}</b></div>`;
    html += `<div class="row"><span>Reading time</span><b>${s.latestTime ? fmtTime(s.latestTime) : "—"}</b></div>`;
    html += `<div class="row"><span>72-hr peak</span><b>${s.peakStr}</b></div>`;
    if (gd.note) html += `<div class="note">${escapeHtml(gd.note)}</div>`;
    if (gd.errors.length) html += `<div class="err">⚠ ${escapeHtml(gd.errors.join("; "))}</div>`;
    if (gd.gauge.custom) {
      html += `<button class="remove-btn" type="button" data-nwsli="${escapeHtml(gd.gauge.nwsli)}" title="Remove gauge" aria-label="Remove gauge">×</button>`;
    }
    card.innerHTML = html;
    root.appendChild(card);
  }
}

function renderChart(gd, container) {
  const traces = [];
  const hasStageOnly = !gd.fcstFlow && gd.fcstStage;

  if (gd.obs && gd.obs.values.length) {
    traces.push({
      x: gd.obs.times, y: gd.obs.values,
      mode: "lines", name: "Observed (cfs)",
      line: { color: "#1f77b4", width: 2 },
      hovertemplate: "%{x|%a %b %d %H:%M}<br><b>%{y:,.0f} cfs</b><extra></extra>",
      yaxis: "y",
    });
  }
  if (gd.fcstFlow && gd.fcstFlow.values.length) {
    traces.push({
      x: gd.fcstFlow.times, y: gd.fcstFlow.values,
      mode: "lines", name: "Forecast (cfs)",
      line: { color: "#d62728", width: 2, dash: "dash" },
      hovertemplate: "%{x|%a %b %d %H:%M}<br><b>%{y:,.0f} cfs</b> (forecast)<extra></extra>",
      yaxis: "y",
    });
  } else if (gd.fcstStage && gd.fcstStage.values.length) {
    traces.push({
      x: gd.fcstStage.times, y: gd.fcstStage.values,
      mode: "lines", name: "Forecast (stage, ft)",
      line: { color: "#d62728", width: 2, dash: "dash" },
      hovertemplate: "%{x|%a %b %d %H:%M}<br><b>%{y:.2f} ft</b> (stage forecast)<extra></extra>",
      yaxis: "y2",
    });
  }

  // If no traces at all, show a message instead of feeding Plotly empty arrays
  if (traces.length === 0) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:#999;font-size:13px">No data to chart</div>';
    return;
  }

  const layout = {
    margin: { l: 50, r: hasStageOnly ? 50 : 16, t: 10, b: 36 },
    showlegend: true,
    legend: { orientation: "h", y: 1.12, x: 0, xanchor: "left", font: { size: 11 } },
    hovermode: "x unified",
    plot_bgcolor: "white",
    paper_bgcolor: "white",
    xaxis: { gridcolor: "#eee", showgrid: true, fixedrange: false },
    yaxis: {
      title: { text: "cfs", font: { size: 11 } },
      gridcolor: "#eee", showgrid: true, rangemode: "tozero",
      tickformat: ",d", fixedrange: false,
    },
  };
  if (hasStageOnly) {
    layout.yaxis2 = {
      title: { text: "ft", font: { size: 11 } },
      overlaying: "y", side: "right", showgrid: false,
    };
  }

  const config = {
    responsive: true, displaylogo: false,
    modeBarButtonsToRemove: ["lasso2d", "select2d", "autoScale2d", "toggleSpikelines"],
    displayModeBar: false,
  };

  try {
    Plotly.newPlot(container, traces, layout, config);
  } catch (e) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:#b00;font-size:13px">Chart render failed: ${e.message}</div>`;
  }
}

function renderCharts(allData) {
  const root = document.getElementById("charts");
  root.innerHTML = "";
  for (const gd of allData) {
    try {
      const card = document.createElement("div");
      card.className = "chart-card";
      const title = document.createElement("div");
      title.className = "chart-title";
      title.textContent = gd.gauge.name;
      const sub = document.createElement("div");
      sub.className = "chart-sub" + (gd.errors.length ? " warn" : "");
      const subParts = [`USGS ${gd.gauge.usgs} · NWSLI ${gd.gauge.nwsli}`];
      if (gd.note) subParts.push(gd.note);
      if (gd.errors.length) subParts.push("⚠ " + gd.errors.join("; "));
      sub.textContent = subParts.join(" · ");

      const plot = document.createElement("div");
      plot.className = "plot";

      card.appendChild(title);
      card.appendChild(sub);
      card.appendChild(plot);
      root.appendChild(card);

      renderChart(gd, plot);
    } catch (e) {
      console.error("render failed for", gd.gauge.name, e);
    }
  }
}

// -------------------------------------------------------- main

const refreshBtn = document.getElementById("refreshBtn");
const metaLine = document.getElementById("metaLine");

async function loadAll() {
  refreshBtn.disabled = true;
  metaLine.textContent = "Fetching…";
  document.getElementById("summary").innerHTML = '<div class="loading">Loading data from USGS and NOAA…</div>';
  document.getElementById("charts").innerHTML = "";

  try {
    // collectGauge already swallows errors per-gauge into the result object,
    // so this should never throw — but allSettled belt-and-suspenders.
    const gauges = activeGauges();
    const settled = await Promise.allSettled(gauges.map(collectGauge));
    const allData = settled.map((s, i) => {
      if (s.status === "fulfilled") return s.value;
      return { gauge: gauges[i], obs: null, fcstFlow: null, fcstStage: null,
               note: "", errors: ["Unexpected: " + (s.reason?.message ?? s.reason)] };
    });

    renderSummary(allData);
    renderCharts(allData);

    const anyData = allData.some(gd => (gd.obs && gd.obs.values.length) || gd.fcstFlow || gd.fcstStage);
    if (!anyData) {
      // Everything failed — show the banner *in addition to* the per-gauge cards
      // so the user still sees which gauges errored and how.
      const banner = document.createElement("div");
      banner.className = "error-banner";
      banner.innerHTML =
        "All data sources failed.<br><br>" +
        "If you opened this from a local file, some browsers block API calls. " +
        "Try opening it from a hosted URL (GitHub Pages, Netlify, etc.).";
      document.getElementById("summary").prepend(banner);
    }

    metaLine.textContent = "Updated " + new Date().toLocaleString(undefined,
      { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  } catch (e) {
    document.getElementById("summary").innerHTML =
      `<div class="error-banner">Failed to load: ${e.message}</div>`;
    metaLine.textContent = "Error";
  } finally {
    refreshBtn.disabled = false;
  }
}

refreshBtn.addEventListener("click", loadAll);

// -------------------------------------------------------- add-gauge UI

const addToggleBtn = document.getElementById("addToggleBtn");
const addPanel = document.getElementById("addPanel");
const addInput = document.getElementById("addInput");
const addStatus = document.getElementById("addStatus");
const addResults = document.getElementById("addResults");

let _catalogPromise = null;
function ensureCatalog() {
  if (!_catalogPromise) {
    _catalogPromise = loadCatalog().catch(e => { _catalogPromise = null; throw e; });
  }
  return _catalogPromise;
}

function setAddStatus(msg, warn) {
  addStatus.textContent = msg || "";
  addStatus.className = "add-status" + (warn ? " warn" : "");
}

function takenLids() {
  const set = new Set(GAUGES.map(g => g.nwsli));
  for (const g of loadUserGauges()) set.add(g.nwsli);
  return set;
}

function renderResults(matches) {
  if (matches.length === 0) {
    addResults.innerHTML = '<div class="gauge-result" style="cursor:default;color:var(--muted)">No matches</div>';
    return;
  }
  const taken = takenLids();
  const html = matches.map(m => {
    const already = taken.has(m.lid);
    const cls = "gauge-result" + (already ? " already" : "");
    const metaParts = [m.state, m.lid].filter(Boolean);
    if (already) metaParts.push("already added");
    return `<div class="${cls}" data-lid="${escapeHtml(m.lid)}" data-name="${escapeHtml(m.name)}">
      <div class="gname">${escapeHtml(m.name)}</div>
      <div class="gmeta">${escapeHtml(metaParts.join(" · "))}</div>
    </div>`;
  }).join("");
  addResults.innerHTML = html;
}

async function openAddPanel() {
  addPanel.hidden = false;
  addInput.value = "";
  addResults.innerHTML = "";
  addToggleBtn.textContent = "Cancel";
  setAddStatus("Loading gauge catalog (large download, first time only)…");
  try {
    const cat = await ensureCatalog();
    setAddStatus(`Type to search ${cat.length.toLocaleString()} gauges`);
    addInput.focus();
  } catch (e) {
    setAddStatus("Failed to load catalog: " + e.message, true);
  }
}

function closeAddPanel() {
  addPanel.hidden = true;
  addInput.value = "";
  addResults.innerHTML = "";
  setAddStatus("");
  addToggleBtn.textContent = "+ Add gauge";
}

let _searchTimer = null;
addInput.addEventListener("input", () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(async () => {
    const q = addInput.value;
    if (q.trim().length < 2) {
      addResults.innerHTML = "";
      return;
    }
    try {
      const cat = await ensureCatalog();
      renderResults(searchCatalog(cat, q));
    } catch (e) {
      setAddStatus("Search failed: " + e.message, true);
    }
  }, 220);
});

addResults.addEventListener("click", async (ev) => {
  const row = ev.target.closest(".gauge-result[data-lid]");
  if (!row || row.classList.contains("already")) return;
  const lid = row.dataset.lid;
  const name = row.dataset.name;
  setAddStatus(`Looking up USGS link for ${name}…`);
  try {
    const usgs = await lookupUsgsId(lid);
    if (!usgs) {
      setAddStatus(`${name} has no linked USGS site — flow data not available`, true);
      return;
    }
    const list = loadUserGauges();
    list.push({ name, usgs, nwsli: lid });
    saveUserGauges(list);
    closeAddPanel();
    await loadAll();
  } catch (e) {
    setAddStatus("Lookup failed: " + e.message, true);
  }
});

addToggleBtn.addEventListener("click", () => {
  if (addPanel.hidden) openAddPanel();
  else closeAddPanel();
});

document.getElementById("summary").addEventListener("click", async (ev) => {
  const btn = ev.target.closest(".remove-btn[data-nwsli]");
  if (!btn) return;
  const lid = btn.dataset.nwsli;
  const list = loadUserGauges().filter(g => g.nwsli !== lid);
  saveUserGauges(list);
  await loadAll();
});

// Kick off on load
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", loadAll);
} else {
  loadAll();
}
</script>
</body>
</html>
